services:
  web:
    build:
      context: ./backend
    container_name: nearhands_web
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: nearhands_db
    environment:
      POSTGRES_DB: nearhands_db
      POSTGRES_USER: nearhands_user
      POSTGRES_PASSWORD: nearhands_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: nearhands_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: